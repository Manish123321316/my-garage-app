{% extends "layout.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card bg-dark text-white shadow-lg border-warning p-4">
                <div class="text-center mb-4">
                    <h2 class="text-warning">Security Check 🔐</h2>
                    <p class="text-muted">Enter the 6-digit code sent to your email.</p>
                </div>
                
                <form method="POST">
                    <div class="mb-4">
                        <input type="text" name="otp" class="form-control form-control-lg text-center" 
                               placeholder="0 0 0 0 0 0" maxlength="6" required 
                               style="font-size: 2rem; letter-spacing: 8px; background: #333; color: #ffc107; border: 1px solid #555;">
                    </div>
                    <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold">Verify & Access Dashboard</button>
                </form>
                
                <div class="text-center mt-3">
                    <a href="{{ url_for('login') }}" class="text-muted small text-decoration-none">← Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

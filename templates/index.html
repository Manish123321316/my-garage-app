{% extends "layout.html" %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center">
        <h2>Welcome, Admin!</h2>
        <a href="/logout" class="btn btn-outline-danger">Logout</a>
    </div>

    <div class="row mt-4">
        <div class="col-md-4 mb-2">
            <div class="card bg-primary text-white p-3 shadow">
                <h4>Total Clients: {{ stats.clients }}</h4>
            </div>
        </div>
        <div class="col-md-4 mb-2">
            <div class="card bg-success text-white p-3 shadow">
                <h4>Total Bills: {{ stats.bills }}</h4>
            </div>
        </div>
        <div class="col-md-4 mb-2">
            <div class="card bg-info text-white p-3 shadow">
                <h4>Total Income: ₹{{ stats.income }}</h4>
            </div>
        </div>
    </div>

    <div class="card mt-4 p-4 shadow">
        <h3><i class="bi bi-plus-circle"></i> Create New Bill</h3>
        <hr>
        <form action="/generate_bill" method="POST">
            <div class="row g-3">
                <div class="col-md-3">
                    <label>Car Number</label>
                    <input type="text" name="car_no" placeholder="RJ27..." class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label>Car Model</label>
                    <input type="text" name="car_model" placeholder="Swift/Thar" class="form-control">
                </div>
                <div class="col-md-3">
                    <label>Owner Name</label>
                    <input type="text" name="owner" placeholder="Customer Name" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label>Mobile</label>
                    <input type="text" name="mobile" placeholder="10 Digit Number" class="form-control" required>
                </div>
            </div>

            <div class="table-responsive mt-4">
                <table class="table table-bordered">
                    <thead class="table-dark">
                        <tr>
                            <th>Service</th>
                            <th>Price</th>
                            <th>Discount (%)</th>
                            <th>Final Price</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <select name="service_names[]" class="form-control">
                                    <option value="Select">-- Select Service --</option>
                                    {% for s in services %}
                                    <option value="{{ s.name }}">{{ s.name }} (₹{{ s.price }})</option>
                                    {% endfor %}
                                </select>
                            </td>
                            <td><input type="number" name="service_prices[]" class="form-control" value="0"></td>
                            <td><input type="number" name="service_discs[]" class="form-control" value="0"></td>
                            <td><input type="number" name="service_totals[]" class="form-control" value="0" readonly></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <input type="hidden" name="grand_total_val" value="0">
            <button type="submit" class="btn btn-primary btn-lg w-100 shadow">Generate & Print PDF Bill</button>
        </form>
    </div>
</div>
{% endblock %}

{% extends "layout.html" %}
{% block content %}
<div class="card p-4 shadow-sm">
    <h5 class="fw-bold mb-4">CLIENT DATA (AUTO-SAVED)</h5>
    <table class="table table-hover">
        <thead class="table-dark"><tr><th>Car No</th><th>Owner Name</th><th>Contact</th></tr></thead>
        <tbody>{% for c in clients %}<tr><td class="fw-bold">{{c.car_number}}</td><td>{{c.owner_name}}</td><td>{{c.mobile}}</td></tr>{% endfor %}</tbody>
    </table>
</div>
{% endblock %}

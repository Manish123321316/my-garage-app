{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-4">
        <div class="card p-5 text-center shadow-lg">
            <h2 class="fw-bold mb-4">Portal Login</h2>
            <form method="POST">
                <div class="mb-3">
                    <input type="text" name="username" class="form-control form-control-lg" placeholder="Username" required>
                </div>
                <div class="mb-3">
                    <input type="password" name="password" class="form-control form-control-lg" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">Login to System</button>
            </form>
            <div class="mt-4 p-2 bg-light rounded">
                <small class="text-muted">Default Admin: <b>admin / 123</b></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
